<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNF 70版本 — 粉装/史诗独立加成机制分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0f0f1a; color: #e0e0e0; line-height: 1.7; padding: 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 26px; color: #f0c040; text-align: center; margin-bottom: 8px; }
  h2 { font-size: 18px; color: #7ec8e3; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #2a2a40; }
  h3 { font-size: 15px; color: #a0a0c0; margin: 18px 0 8px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  th { background: #1a1a30; color: #f0c040; padding: 10px 8px; text-align: center; border: 1px solid #2a2a40; }
  td { padding: 8px; text-align: center; border: 1px solid #2a2a40; background: #141424; }
  tr:hover td { background: #1a1a35; }
  .source { font-size: 11px; color: #6a8; font-weight: normal; }
  .highlight { color: #f0c040; font-weight: bold; }
  .berserker { border-left: 3px solid #e04040; }
  .swordsman { border-left: 3px solid #40a0e0; }
  .note { font-size: 12px; color: #999; margin: 8px 0; padding: 8px; background: #1a1a2a; border-radius: 4px; }
  .formula { font-family: 'Consolas', 'Courier New', monospace; background: #1a1a2a; padding: 10px 14px; border-radius: 4px; font-size: 13px; margin: 10px 0; color: #c0d0e0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  .badge-green { background: #1a4a1a; color: #40e040; }
  .badge-yellow { background: #4a4a1a; color: #f0c040; }
  .badge-red { background: #4a1a1a; color: #e04040; }
  .badge-purple { background: #3a1a4a; color: #c060f0; }
  .badge-orange { background: #4a2a1a; color: #f0a040; }
  .summary-box { background: linear-gradient(135deg, #1a1a30, #1a2a3a); border: 1px solid #3a3a5a; border-radius: 6px; padding: 16px; margin: 16px 0; }
  .summary-box h3 { margin-top: 0; }
  .comparison { display: flex; gap: 20px; margin: 16px 0; }
  .comparison > div { flex: 1; padding: 14px; border-radius: 6px; }
  .comparison .berserker-card { background: #2a1a1a; border: 1px solid #4a2a2a; }
  .comparison .swordsman-card { background: #1a2a3a; border: 1px solid #2a4a6a; }
  .footer { text-align: center; color: #555; font-size: 11px; margin-top: 32px; padding-top: 12px; border-top: 1px solid #2a2a40; }
  .tag-row { margin-bottom: 12px; }
  .tag { display: inline-block; padding: 3px 10px; margin-right: 6px; border-radius: 12px; font-size: 11px; background: #2a2a40; color: #a0a0c0; }
  .rare-purple { background: #2a1a3a; border-color: #5a3080; }
  .rare-orange { background: #3a2a1a; border-color: #805020; }
